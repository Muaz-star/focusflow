databases:
  - name: focusflow-db
    plan: free
    databaseName: focusflow
    user: focusflow

services:
  - type: web
    name: focusflow
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node dist/index.cjs
    nodeVersion: 20
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: focusflow-db
          property: connectionString
